## Exemple — Module ampoule RGB (NeoPixel / WS2812B)
##
## Même principe que ampoule_mono.yaml mais pour une bande LED RGB.
## En mode fallback, toggle = ON à 100% blanc / OFF.

substitutions:
  device_name: ampoule-rgb
  button_mac: "11:22:33:44:55:66"

esphome:
  name: ${device_name}
  friendly_name: Ampoule RGB

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [espnow_receiver]

# ── LED RGB WS2812B ────────────────────────────────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    id: my_light
    name: "Ampoule RGB"
    pin: GPIO16
    num_leds: 1
    rmt_channel: 0
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 300ms
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 1s
          update_interval: 2s

# ── ESP-NOW receiver ───────────────────────────────────────────────────────────
espnow_receiver:
  id: espnow_rx
  peer_mac: ${button_mac}
  light_id: my_light
