substitutions:
  device_name: light-device
  # MAC addresses of the button ESP32 senders.
  button_mac_1: "11:22:33:44:55:66"
  button_mac_2: "11:22:33:44:55:77"

esphome:
  name: ${device_name}
  friendly_name: Light Device

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [espnow_receiver]

# ── Outputs ────────────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: light_output_1
    pin: GPIO2
  - platform: ledc
    id: light_output_2
    pin: GPIO4

# ── Lights ────────────────────────────────────────────────────────────────────
light:
  - platform: monochromatic
    id: my_light_1
    name: "Light 1"
    output: light_output_1
  - platform: monochromatic
    id: my_light_2
    name: "Light 2"
    output: light_output_2

# ── ESP-NOW receivers (multi-instance) ────────────────────────────────────────
espnow_receiver:
  - id: espnow_rx_1
    peer_mac: ${button_mac_1}
    light_id: my_light_1
  - id: espnow_rx_2
    peer_mac: ${button_mac_2}
    light_id: my_light_2
