substitutions:
  device_name: light-device
  # MAC address of the button ESP32 (sender).
  # Run `esphome logs button_device.yaml` and look for "WiFi MAC Address: xx:xx:xx:xx:xx:xx"
  button_mac: "11:22:33:44:55:66"

esphome:
  name: ${device_name}
  friendly_name: Light Device

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [espnow_receiver]

# ── Light output ───────────────────────────────────────────────────────────────
output:
  - platform: ledc
    id: light_output
    pin: GPIO2

light:
  - platform: monochromatic
    id: my_light
    name: "Light"
    output: light_output

# ── ESP-NOW receiver ───────────────────────────────────────────────────────────
espnow_receiver:
  id: espnow_rx
  peer_mac: ${button_mac}   # only accept packets from this MAC
  light_id: my_light
