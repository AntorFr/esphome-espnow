substitutions:
  device_name: button-device
  # MAC address of the light ESP32 (receiver).
  # Run `esphome logs light_device.yaml` and look for "WiFi MAC Address: xx:xx:xx:xx:xx:xx"
  light_mac: "AA:BB:CC:DD:EE:FF"

esphome:
  name: ${device_name}
  friendly_name: Button Device

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [espnow_sender]

# ── Connectivity sensor (source-of-truth avec delayed_off) ────────────────────
binary_sensor:
  - platform: status
    id: api_connected
    name: "API Connected"
    filters:
      - delayed_off: 30s

  # ── Button GPIO ──────────────────────────────────────────────────────────────
  - platform: gpio
    id: my_button
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button"
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - lambda: id(espnow_tx).send_command(true);

# ── ESP-NOW sender ─────────────────────────────────────────────────────────────
espnow_sender:
  id: espnow_tx
  peer_mac: ${light_mac}
  # Délègue la détection à api_connected plutôt qu'au check interne
  connectivity_sensor_id: api_connected
  fallback_timeout: 30s
  recovery_timeout: 10s
  action: toggle
  on_fallback_enter:
    - logger.log: "ESP-NOW fallback: HA unreachable, using direct control"
  on_fallback_exit:
    - logger.log: "ESP-NOW fallback: HA restored, reverting to normal mode"
